<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>RPG Game with Javascript</title>
  </head>
  <body>
    <!-- Mother sections -->
    <section class="mother-section">
      <section class="result-section">
        <div style="width: 100%;">
          <p id="battle-result"></p>
        </div>
      </section>

      <!-- Health section -->
      <section class="health-section">
        <div class="health-gap">
          <p>Hero HP:</p>
          <div id="hero-health" class="border-health-bar">
            <div class="hero-health-bar">

            </div>
          </div>
        </div>
        <div class="health-gap">
          <p>Monster HP:</p>
          <div id="monster-health" class="border-health-bar">
            <div class="monster-health-bar"></div>
          </div>
        </div>
      </section>

      <!-- Decision Section -->
      <section class="decision-section">
        <button id="attack-button">Attack</button>
        <button id="ultimate-button">Ultimate Attack</button>
        <button id="heal-button">Heal</button>
      </section>

      <!-- Battle Logs Section -->
      <section id="battle-logs" class="logs-section"></section>
    </section>
  </body>
  <script src="scripts.js"></script>
</html>
